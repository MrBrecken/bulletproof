<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siamese Agency Clicker</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #007AFF;
            --secondary: #f0f0f0;
            --jarvis-red: #ff3b30;
        }

        * { box-sizing: border-box; user-select: none; -webkit-user-drag: none; outline: none; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- VISIBLE SWIRLY LIQUID BG --- */
        #bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background: #fff; overflow: hidden;
        }
        .liquid-blob {
            position: absolute; width: 160%; height: 160%;
            top: -30%; left: -30%;
            /* Darkened colors for high visibility */
            background: repeating-radial-gradient(circle at center, #bbb 0%, #fff 20%, #d0d0d0 40%);
            filter: blur(60px);
            animation: swirl 25s linear infinite;
            opacity: 0.8;
        }
        .liquid-blob:nth-child(2) {
            animation: swirl 40s linear infinite reverse;
            background: repeating-conic-gradient(from 0deg, #fff 0deg 90deg, #c0c0c0 180deg);
            opacity: 0.4;
        }
        @keyframes swirl {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* --- LAYOUT --- */
        #game-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #sidebar {
            width: 440px; border-left: 3px solid #000;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; padding: 30px; z-index: 10;
        }

        #points { font-size: 6rem; font-weight: 900; margin: 0; letter-spacing: -5px; line-height: 0.85; }

        /* --- NAV ARROWS --- */
        .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .nav-btn {
            background: #000; color: #fff; border: none; border-radius: 10px;
            width: 50px; height: 50px; cursor: pointer; font-size: 2rem;
            display: flex; align-items: center; justify-content: center; transition: 0.1s;
        }
        .nav-btn:hover { background: var(--accent); transform: scale(1.05); }

        /* --- CLICKER --- */
        #clicker-container { cursor: pointer; transition: transform 0.05s; margin: 40px 0; }
        #clicker-image { width: 360px; height: 360px; object-fit: contain; }
        #clicker-container:active { transform: scale(0.9); }

        /* --- UPGRADES --- */
        .upgrade-card {
            background: var(--secondary); border-radius: 24px; padding: 20px;
            margin-bottom: 15px; cursor: pointer; display: flex; align-items: center;
            gap: 20px; border: 3px solid transparent; transition: 0.2s;
        }
        .upgrade-card:hover:not(.locked) { background: #fff; border-color: #000; }
        .upgrade-card.locked { opacity: 0.2; filter: grayscale(1); cursor: not-allowed; }

        .upgrade-icon { width: 75px; height: 75px; border-radius: 16px; object-fit: cover; }
        .u-name { font-weight: 900; font-size: 1.2rem; display: block; text-transform: uppercase; }
        .u-cost { font-weight: 700; font-size: 0.95rem; color: #555; }

        /* JARVIS ERROR */
        .broken-img {
            width: 75px; height: 75px; border-radius: 16px; background: #000;
            border: 2px solid var(--jarvis-red); display: flex; align-items: center;
            justify-content: center; font-size: 0.7rem; color: var(--jarvis-red);
            font-weight: 900; text-align: center;
        }

        /* --- SETTINGS (BOTTOM LEFT POPUP) --- */
        #settings-trigger {
            position: fixed; bottom: 30px; left: 30px; background: #000; color: #fff;
            border: none; padding: 18px 28px; border-radius: 16px; cursor: pointer;
            font-weight: 900; font-size: 0.8rem; letter-spacing: 1.5px; z-index: 100;
        }

        #settings-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            z-index: 1000; display: none;
            align-items: center; justify-content: center;
        }
        .settings-box { 
            background: #fff; padding: 40px; border-radius: 30px; 
            width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .settings-box h2 { font-size: 2.5rem; font-weight: 900; margin: 0 0 30px; letter-spacing: -2px; }

        .big-toggle {
            background: #000; color: #fff; padding: 20px; border-radius: 18px;
            font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .big-toggle:hover { background: var(--accent); }
        .big-toggle.off { background: #ddd; color: #888; }

        /* Rebirth */
        #rebirth-btn {
            width: 100%; padding: 25px; background: #000; color: #fff; border: none;
            font-weight: 900; border-radius: 20px; font-size: 1.3rem; cursor: pointer;
        }
        #rebirth-btn:disabled { background: #eee; color: #aaa; cursor: not-allowed; }

        .particle {
            position: absolute; font-weight: 900; pointer-events: none; color: #000;
            animation: pOut 0.8s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; font-size: 2.2rem;
        }
        @keyframes pOut {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -250px) scale(1.4); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="bg-container">
    <div class="liquid-blob"></div>
    <div class="liquid-blob"></div>
</div>

<audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>
<audio id="click-sfx"><source src="click.mp3" type="audio/mpeg"></audio>

<div id="game-view">
    <div style="text-align: center;">
        <div style="font-weight: 900; letter-spacing: 6px; font-size: 0.75rem; color: #999; text-transform: uppercase;">The Siamese Agency</div>
        <h1 id="points">0</h1>
        <div id="stats" style="font-weight: 800; color: #444; margin-top: 15px; font-size: 1.1rem;">
            +1/CLICK • 0/SEC
        </div>
    </div>

    <div id="clicker-container">
        <img id="clicker-image" src="IMG_2109-removebg-preview.png" alt="Main">
    </div>
</div>

<div id="sidebar">
    <div class="nav-header">
        <button class="nav-btn" onclick="changePage(-1)">‹</button>
        <h2 id="page-title" style="font-weight: 900; font-size: 1.5rem; margin: 0; letter-spacing: -1px;">UPGRADES</h2>
        <button class="nav-btn" onclick="changePage(1)">›</button>
    </div>

    <div id="upgrades-list" style="flex: 1; overflow-y: auto;"></div>
    
    <div style="margin-top: 30px; border-top: 3px solid #000; padding-top: 25px;">
        <button id="rebirth-btn" onclick="rebirth()">REBIRTH (1e100)</button>
        <p id="rebirth-count" style="text-align: center; font-weight: 900; font-size: 0.9rem; margin-top: 12px; color: #666;">0 TOTAL REBIRTHS</p>
    </div>
</div>

<button id="settings-trigger" onclick="toggleSettings()">SETTINGS</button>

<div id="settings-overlay" onclick="closeSettings(event)">
    <div class="settings-box">
        <h2>OPTIONS</h2>
        <div class="big-toggle" id="music-toggle" onclick="toggleMute()">
            <span>AUDIO</span>
            <span id="music-status">ON</span>
        </div>
        <div style="margin-top: 30px; font-weight: 900; color: #aaa; cursor: pointer;" onclick="toggleSettings()">CLOSE</div>
    </div>
</div>

<script>
    let game = {
        points: 0n,
        clickPower: 1n,
        pps: 0n,
        rebirths: 0n,
        agencyIdx: 0,
        jarvisIdx: 0,
        page: 0,
        muted: false
    };

    const agencyImgs = [
        "rhythia-steam.png", "OIP.webp", "OIP (1).webp", 
        "Annotation 2025-12-18 203140.png", "baldi.png-removebg-preview.png",
        "blossom.gif", "bradarwhatisthis.gif", "togif.gif", "whoisalter.png", "IMG_1114.jpg"
    ];

    const suffixes = ["", "k", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc", "Ud", "Dd", "Td", "Qad", "Qid", "Sxd", "Spd", "Ocd", "Nod", "Vg"];

    function format(n) {
        if (n < 1000n) return n.toString();
        let s = n.toString();
        let unitIdx = Math.floor((s.length - 1) / 3);
        
        if (unitIdx >= suffixes.length) {
            return s[0] + "." + s.substring(1,3) + "e" + (s.length - 1);
        }
        
        let digits = s.length % 3 || 3;
        return s.substring(0, digits) + "." + s.substring(digits, digits + 2) + suffixes[unitIdx];
    }

    function changePage(dir) {
        game.page = (game.page + dir + 2) % 2;
        document.getElementById('page-title').innerText = game.page === 0 ? "UPGRADES" : "JARVIS BOTS";
        render();
    }

    function render() {
        document.getElementById('points').innerText = format(game.points);
        const multi = 2n ** game.rebirths;
        document.getElementById('stats').innerText = `+${format(game.clickPower * multi)}/CLICK • ${format(game.pps * multi)}/SEC`;
        document.getElementById('rebirth-count').innerText = `${game.rebirths} TOTAL REBIRTHS`;

        const list = document.getElementById('upgrades-list');
        list.innerHTML = "";

        if (game.page === 0) {
            const upImg = agencyImgs[game.agencyIdx % agencyImgs.length];
            const cost = 50n * (12n ** BigInt(game.agencyIdx));
            createCard("Agency Link", upImg, cost, () => {
                game.points -= cost;
                game.clickPower += (cost / 10n) + 3n;
                game.agencyIdx++;
                render();
            });
        } else {
            const cost = 1000n * (15n ** BigInt(game.jarvisIdx));
            createCard(`Jarvis Mk ${game.jarvisIdx + 1}`, "", cost, () => {
                game.points -= cost;
                game.pps += (cost / 8n) + 10n;
                game.jarvisIdx++;
                render();
            });
        }

        const rCost = 10n ** 100n * (1000n ** game.rebirths);
        const rBtn = document.getElementById('rebirth-btn');
        rBtn.innerText = `REBIRTH (${format(rCost)})`;
        rBtn.disabled = game.points < rCost;
    }

    function createCard(name, src, cost, onClick) {
        const card = document.createElement('div');
        card.className = `upgrade-card ${game.points < cost ? 'locked' : ''}`;
        card.innerHTML = `
            <img src="${src}" class="upgrade-icon" onerror="this.outerHTML='<div class=\\'broken-img\\'>JARVIS<br>ERROR</div>'">
            <div style="flex:1">
                <span class="u-name">${name}</span>
                <span class="u-cost">${format(cost)} Points</span>
            </div>
        `;
        if (game.points >= cost) card.onclick = onClick;
        document.getElementById('upgrades-list').appendChild(card);
    }

    document.getElementById('clicker-container').onmousedown = (e) => {
        const multi = 2n ** game.rebirths;
        const val = game.clickPower * multi;
        game.points += val;
        
        const p = document.createElement('div');
        p.className = 'particle';
        p.innerText = `+${format(val)}`;
        p.style.left = e.clientX + "px"; p.style.top = e.clientY + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
        
        if(!game.muted) {
            document.getElementById('bg-music').play().catch(()=>{});
            document.getElementById('click-sfx').currentTime = 0;
            document.getElementById('click-sfx').play().catch(()=>{});
        }
        render();
    };

    setInterval(() => {
        const multi = 2n ** game.rebirths;
        game.points += (game.pps * multi);
        document.getElementById('points').innerText = format(game.points);
    }, 1000);

    function toggleSettings() {
        const ov = document.getElementById('settings-overlay');
        ov.style.display = ov.style.display === 'flex' ? 'none' : 'flex';
    }

    function closeSettings(e) { if(e.target.id === 'settings-overlay') toggleSettings(); }

    function toggleMute() {
        game.muted = !game.muted;
        const music = document.getElementById('bg-music');
        const status = document.getElementById('music-status');
        const row = document.getElementById('music-toggle');
        
        if(game.muted) {
            music.pause();
            status.innerText = "OFF";
            row.classList.add('off');
        } else {
            music.play().catch(()=>{});
            status.innerText = "ON";
            row.classList.remove('off');
        }
    }

    function rebirth() {
        const rCost = 10n ** 100n * (1000n ** game.rebirths);
        if(game.points >= rCost) {
            game.points = 0n; game.clickPower = 1n; game.pps = 0n;
            game.agencyIdx = 0; game.jarvisIdx = 0;
            game.rebirths++;
            render();
        }
    }

    render();
</script>

</body>
</html>
