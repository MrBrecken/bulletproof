<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siamese Agency Clicker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --bg: #ffffff; --text: #000000; --accent: #007AFF; --secondary: #f0f0f0; --jarvis-red: #ff3b30; --gold: #ffd700; }
        * { box-sizing: border-box; user-select: none; -webkit-user-drag: none; outline: none; }
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- VISIBLE SWIRLY BG --- */
        #bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: url('image_0.png'); /* Vibrant Swirls */
            background-size: cover;
            background-position: center;
            /* Drastically improve visibility */
            filter: contrast(180%) brightness(80%) saturate(140%);
        }

        /* --- Main UI Layers --- */
        #game-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: transparent; }
        
        #sidebar {
            width: 440px; border-left: 3px solid #000;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; padding: 30px; z-index: 10;
        }

        #points-container {
            text-align: center; margin-bottom: 20px;
        }
        #points { font-size: 6rem; font-weight: 900; margin: 0; letter-spacing: -5px; line-height: 0.85; }
        #pps-display { font-weight: 800; color: #444; font-size: 1.1rem; }

        /* Siamese Gems Counter */
        #gems-container {
            position: fixed; top: 30px; right: 480px; /* Right next to sidebar */
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.8); color: var(--gold);
            padding: 10px 20px; border-radius: 50px;
            font-weight: 900; font-size: 1.2rem; z-index: 100;
        }
        #gems-count { color: #fff; }

        /* Minigames Button (Top Left) */
        #minigames-btn {
            position: fixed; top: 30px; left: 30px;
            background: #000; color: #fff; border: none;
            padding: 15px 25px; border-radius: 16px; cursor: pointer;
            font-weight: 900; font-size: 0.9rem; letter-spacing: 1px; z-index: 100;
        }
        #minigames-btn:hover { background: #333; transform: scale(1.05); }

        /* Clicker */
        #clicker-container { cursor: pointer; transition: transform 0.05s; margin: 30px 0; }
        #clicker-image { width: 340px; height: 340px; object-fit: contain; }
        #clicker-container:active { transform: scale(0.92); }

        /* Sidebar Elements */
        .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .nav-btn {
            background: #000; color: #fff; border: none; border-radius: 10px;
            width: 50px; height: 50px; cursor: pointer; font-size: 2rem;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-btn:hover { background: var(--accent); }

        .upgrade-card {
            background: var(--secondary); border-radius: 20px; padding: 16px;
            margin-bottom: 12px; cursor: pointer; display: flex; align-items: center;
            gap: 15px; border: 2px solid transparent; transition: 0.2s;
        }
        .upgrade-card:hover:not(.locked) { background: #fff; border-color: #000; }
        .upgrade-card.locked { opacity: 0.2; filter: grayscale(1); cursor: not-allowed; }
        .upgrade-icon { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }
        .u-name { font-weight: 900; font-size: 1.1rem; display: block; text-transform: uppercase; }
        .u-cost { font-weight: 700; font-size: 0.85rem; color: #555; }

        #rebirth-btn {
            width: 100%; padding: 20px; background: #000; color: #fff; border: none;
            font-weight: 900; border-radius: 18px; font-size: 1.2rem; cursor: pointer;
        }
        #rebirth-btn:disabled { background: #eee; color: #aaa; }

        /* --- MINIGAMES MENU OVERLAY --- */
        #minigames-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(20px);
            z-index: 1000; display: none; align-items: center; justify-content: center;
        }
        .minigames-box {
            background: #fff; padding: 50px; border-radius: 30px;
            width: 500px; text-align: center;
        }
        .minigames-box h2 { font-size: 3rem; font-weight: 900; margin-bottom: 40px; letter-spacing: -2px; }
        
        .game-select-btn {
            width: 100%; padding: 25px; background: #000; color: #fff;
            border-radius: 18px; font-weight: 900; font-size: 1.3rem;
            cursor: pointer; border: none; margin-bottom: 20px;
        }
        .game-select-btn:hover { background: var(--accent); }
        .close-games-btn { font-weight: 900; color: #aaa; cursor: pointer; text-decoration: underline; margin-top: 30px; }

        /* --- FLAPPY SIAMESE GAME --- */
        #flappy-game-area {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1001; display: none; background: #4ec0ca; overflow: hidden;
        }
        #flappy-back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 1003;
            background: rgba(0,0,0,0.7); color: #fff; border: none;
            padding: 10px 20px; border-radius: 10px; font-weight: 900; cursor: pointer;
        }
        #flappy-canvas { display: block; width: 100%; height: 100%; z-index: 1002; }
        
        #flappy-score-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 30px; background: rgba(0,0,0,0.6);
            padding: 15px 30px; border-radius: 15px;
            color: #fff; font-weight: 900; font-size: 1.5rem; z-index: 1003; text-align: center;
        }
        #flappy-start-hint {
            position: absolute; bottom: 15vh; left: 50%; transform: translateX(-50%);
            color: #fff; font-weight: 900; font-size: 1.8rem; z-index: 1003; text-shadow: 0 2px #000;
        }

        /* Float Particles */
        .particle {
            position: absolute; font-weight: 900; pointer-events: none; color: #000;
            animation: pOut 0.8s forwards; font-size: 2.2rem;
        }
        @keyframes pOut { 0% { transform: translate(-50%,-50%) scale(1); opacity: 1; } 100% { transform: translate(-50%,-180px) scale(1.4); opacity: 0; } }
    </style>
</head>
<body>

<div id="bg-container"></div>
<div id="effect-layer"></div>

<audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>
<audio id="click-sfx"><source src="click.mp3" type="audio/mpeg"></audio>

<button id="minigames-btn" onclick="toggleMinigames()">MINIGAMES</button>

<div id="gems-container">
    <span>💎 GEMS:</span>
    <span id="gems-count">0</span>
</div>

<div id="game-view">
    <div id="points-container">
        <div style="font-weight: 900; letter-spacing: 5px; font-size: 0.8rem; color: #999; text-transform: uppercase;">Siamese Wealth</div>
        <h1 id="points">0</h1>
        <div id="pps-display">+1/click • 0/sec</div>
    </div>
    <div id="clicker-container"><img id="clicker-image" src="IMG_2109-removebg-preview.png"></div>
</div>

<div id="sidebar">
    <div class="nav-header">
        <button class="nav-btn" onclick="changePage(-1)">‹</button>
        <h2 id="page-title" style="font-weight: 900; font-size: 1.3rem; margin: 0;">AGENCY UPGRADES</h2>
        <button class="nav-btn" onclick="changePage(1)">›</button>
    </div>
    <div id="upgrades-list" style="flex: 1; overflow-y: auto; padding-right: 5px;"></div>
    <div style="margin-top: 30px; border-top: 3px solid #000; padding-top: 25px;">
        <button id="rebirth-btn" onclick="rebirth()">REBIRTH (1e100)</button>
        <p id="rebirth-count" style="text-align: center; font-weight: 900; color: #666; margin: 10px 0 0;">0 TOTAL REBIRTHS</p>
    </div>
</div>

<div id="minigames-overlay" onclick="if(event.target.id==='minigames-overlay') toggleMinigames()">
    <div class="minigames-box">
        <h2>MINIGAMES</h2>
        <button class="game-select-btn" onclick="startFlappySiamese()">FLAPPY SIAMESE</button>
        <p class="close-games-btn" onclick="toggleMinigames()">Close</p>
    </div>
</div>

<div id="flappy-game-area">
    <button id="flappy-back-btn" onclick="quitFlappy()">← Back</button>
    <div id="flappy-score-container">
        <div>Score: <span id="current-flappy-score">0</span></div>
        <div style="color:var(--gold);">Gems Earned: <span id="earned-gems-flappy">0</span></div>
    </div>
    <div id="flappy-start-hint">Tap / Press Space to Start</div>
    <canvas id="flappy-canvas"></canvas>
</div>

<script>
    // --- MAIN GAME LOGIC ---
    let game = {
        points: 0n, clickPower: 1n, pps: 0n, rebirths: 0n,
        gems: 0,
        agencyIdx: 0, jarvisIdx: 0,
        page: 0, muted: false
    };

    // (Images defined as before)
    const agencyImgs = ["rhythia-steam.png", "OIP.webp", "OIP (1).webp", "Annotation 2025-12-18 203140.png", "baldi.png-removebg-preview.png", "blossom.gif", "bradarwhatisthis.gif", "togif.gif", "whoisalter.png", "IMG_1114.jpg"];
    const suffixes = ["", "k", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc", "Ud", "Dd", "Td", "Qad", "Qid", "Sxd", "Spd", "Ocd", "Nod", "Vg"];

    function formatBig(n) {
        if (n < 1000n) return n.toString();
        let s = n.toString();
        let unitIdx = Math.floor((s.length - 1) / 3);
        if (unitIdx >= suffixes.length) return s[0] + "." + s.substring(1,3) + "e" + (s.length - 1);
        let digits = s.length % 3 || 3;
        return s.substring(0, digits) + "." + s.substring(digits, digits + 2) + suffixes[unitIdx];
    }

    function renderMainUI() {
        document.getElementById('points').innerText = formatBig(game.points);
        document.getElementById('gems-count').innerText = game.gems;
        const multi = 2n ** game.rebirths;
        document.getElementById('pps-display').innerText = `+${formatBig(game.clickPower * multi)}/CLICK • ${formatBig(game.pps * multi)}/SEC`;
        document.getElementById('rebirth-count').innerText = `${game.rebirths} TOTAL REBIRTHS`;
        renderUpgradesList();
    }

    function renderUpgradesList() {
        const list = document.getElementById('upgrades-list');
        list.innerHTML = "";
        if (game.page === 0) {
            const up = agencyUpgrades[game.agencyIdx % agencyUpgrades.length];
            const cost = 50n * (12n ** BigInt(game.agencyIdx));
            createCard(up.name, up.img, cost, () => buyUpgrade(cost, 1));
        } else {
            const cost = 1000n * (15n ** BigInt(game.jarvisIdx));
            createCard(`Jarvis Mk ${game.jarvisIdx + 1}`, "Jarvis Bot", "", cost, () => buyUpgrade(cost, 2));
        }
        updateRebirthBtn();
    }

    // Helper to create cards
    function createCard(name, desc, img, cost, onBuy) {
        const card = document.createElement('div');
        card.className = `upgrade-card ${game.points < cost ? 'locked' : ''}`;
        card.innerHTML = `<img src="${img}" class="upgrade-icon" onerror="this.src='OIP.webp'"><div style="flex:1"><span class="u-name">${name}</span><span class="u-desc">${desc}</span><span class="u-cost">${formatBig(cost)} Points</span></div>`;
        if (game.points >= cost) card.onclick = onBuy;
        document.getElementById('upgrades-list').appendChild(card);
    }

    // (Upgrade data and buying logic as before, just update render)
    const agencyUpgrades = [ /* ... as before ... */ ];

    function buyUpgrade(cost, type) {
        if(game.points < cost) return;
        game.points -= cost;
        if(type === 1) { // Agency (Click)
            game.clickPower += (cost / 10n) + 3n;
            game.agencyIdx++;
            spawnFloatingItem(agencyUpgrades[(game.agencyIdx-1) % agencyUpgrades.length].img);
        } else { // Jarvis (PPS)
            game.pps += (cost / 8n) + 10n;
            game.jarvisIdx++;
        }
        renderMainUI();
    }

    // click logic, particles, music, rebirth interval, save logic as before...
    document.getElementById('clicker-container').onmousedown = (e) => {
        // ... points add, sound, particle as before ...
        game.points += game.clickPower * (2n ** game.rebirths);
        renderMainUI();
    }

    // --- MINIGAMES MENU LOGIC ---
    function toggleMinigames() {
        const ov = document.getElementById('minigames-overlay');
        ov.style.display = (ov.style.display === 'flex') ? 'none' : 'flex';
    }

    // --- FLAPPY SIAMESE GAME LOGIC ---
    const fCanvas = document.getElementById('flappy-canvas');
    const fCtx = fCanvas.getContext('2d');
    const fArea = document.getElementById('flappy-game-area');
    
    // Game state
    let fGameState = 'ready'; // ready, playing, dead
    let fScore = 0;
    let fEarnedGems = 0;
    let fAnimationId;
    let fScoreBuffer = 0; // Tracks points toward next gem (every 10 score)

    // Load assets
    const birdImg = new Image();
    birdImg.src = 'image_1.png'; // SIAMESE Logo bird
    const pipeImg = new Image();
    pipeImg.src = 'image_16.png'; // Gamer Girl Pipes

    // Constants
    const fGravity = 0.5;
    const fFlapPower = -9;
    const fPipeSpeed = 5;
    const fPipeGap = 210;
    const fPipeWidth = 100;
    const fBirdSize = 60;

    // Entities
    let fBird = { x: 150, y: 0, vel: 0 };
    let fPipes = [];

    function initFlappyCanvas() {
        fCanvas.width = window.innerWidth;
        fCanvas.height = window.innerHeight;
        fBird.y = fCanvas.height / 2 - fBirdSize / 2;
        fBird.vel = 0;
    }

    function resetFlappyGame() {
        fScore = 0;
        fEarnedGems = 0;
        fScoreBuffer = 0;
        fGameState = 'ready';
        initFlappyCanvas();
        fPipes = [];
        updateFlappyScoreDisplay();
        document.getElementById('flappy-start-hint').style.display = 'block';
    }

    function startFlappySiamese() {
        toggleMinigames(); // Close menu
        fArea.style.display = 'block';
        resetFlappyGame();
        
        // Input handlers
        window.addEventListener('keydown', fFlapInput);
        fCanvas.addEventListener('mousedown', fFlapInput);
        window.addEventListener('resize', initFlappyCanvas);
        
        fAnimationId = requestAnimationFrame(flappyLoop);
    }

    function quitFlappy() {
        fArea.style.display = 'none';
        cancelAnimationFrame(fAnimationId);
        window.removeEventListener('keydown', fFlapInput);
        fCanvas.removeEventListener('mousedown', fFlapInput);
        window.removeEventListener('resize', initFlappyCanvas);
        
        // Award gems
        game.gems += fEarnedGems;
        renderMainUI();
    }

    function fFlapInput(e) {
        if(e.type === 'keydown' && e.code !== 'Space') return;
        if(e.type === 'mousedown' && e.target.id === 'flappy-back-btn') return; // Don't flap on back button

        if(fGameState === 'ready') {
            fGameState = 'playing';
            document.getElementById('flappy-start-hint').style.display = 'none';
        }
        if(fGameState === 'playing') {
            fBird.vel = fFlapPower;
        }
        if(fGameState === 'dead') {
            resetFlappyGame();
        }
    }

    function updateFlappyScoreDisplay() {
        document.getElementById('current-flappy-score').innerText = fScore;
        document.getElementById('earned-gems-flappy').innerText = fEarnedGems;
    }

    function flappyLoop() {
        // Clear background
        fCtx.fillStyle = '#4ec0ca';
        fCtx.fillRect(0,0,fCanvas.width,fCanvas.height);

        if(fGameState === 'playing' || fGameState === 'dead') {
            // Apply gravity
            fBird.vel += fGravity;
            fBird.y += fBird.vel;

            // Handle pipes
            if(fGameState === 'playing') {
                if(fPipes.length === 0 || fPipes[fPipes.length-1].x < fCanvas.width - 350) {
                    const topPipeHeight = Math.random() * (fCanvas.height - fPipeGap - 200) + 100;
                    fPipes.push({
                        x: fCanvas.width,
                        topHeight: topPipeHeight,
                        scored: false
                    });
                }
            }

            fPipes.forEach((pipe, index) => {
                if(fGameState === 'playing') pipe.x -= fPipeSpeed;

                // Draw pipes (Pair: one up, one down)
                const bottomY = pipe.topHeight + fPipeGap;
                const bottomHeight = fCanvas.height - bottomY;
                
                // Draw pairs of Gamer Girl pipes
                // Top (Flipped vertically to face down)
                fCtx.save();
                fCtx.translate(pipe.x + fPipeWidth / 2, pipe.topHeight / 2);
                fCtx.scale(1, -1);
                fCtx.drawImage(pipeImg, -fPipeWidth/2, -pipe.topHeight/2, fPipeWidth, pipe.topHeight);
                fCtx.restore();
                // Bottom
                fCtx.drawImage(pipeImg, pipe.x, bottomY, fPipeWidth, bottomHeight);

                // Collision checking
                const birdRect = { x: fBird.x, y: fBird.y, w: fBirdSize, h: fBirdSize };
                const topPipeRect = { x: pipe.x, y: 0, w: fPipeWidth, h: pipe.topHeight };
                const bottomPipeRect = { x: pipe.x, y: bottomY, w: fPipeWidth, h: bottomHeight };

                if(checkCollision(birdRect, topPipeRect) || checkCollision(birdRect, bottomPipeRect) || fBird.y + fBirdSize > fCanvas.height) {
                    fGameState = 'dead';
                }

                // Scoring (Pass pipe)
                if(fGameState === 'playing' && !pipe.scored && pipe.x + fPipeWidth < fBird.x) {
                    pipe.scored = true;
                    fScore++;
                    fScoreBuffer++;
                    
                    // Award Gem every 10 score logic
                    if(fScoreBuffer >= 10) {
                        fEarnedGems++;
                        fScoreBuffer = 0; // Reset buffer
                    }
                    updateFlappyScoreDisplay();
                }

                // Remove offscreen pipes
                if(pipe.x < -fPipeWidth) fPipes.splice(index, 1);
            });
        }

        // Draw bird
        fCtx.drawImage(birdImg, fBird.x, fBird.y, fBirdSize, fBirdSize);

        // Death screen text
        if(fGameState === 'dead') {
            fCtx.fillStyle = 'rgba(0,0,0,0.5)';
            fCtx.fillRect(0,0,fCanvas.width,fCanvas.height);
            fCtx.fillStyle = '#fff';
            fCtx.font = '900 60px Inter';
            fCtx.textAlign = 'center';
            fCtx.fillText("AGENCY TERMINATED", fCanvas.width/2, fCanvas.height/2 - 20);
            fCtx.font = '700 30px Inter';
            fCtx.fillText(`Total Score: ${fScore}`, fCanvas.width/2, fCanvas.height/2 + 30);
            fCtx.fillStyle = var(--gold);
            fCtx.fillText(`Gems Earned: ${fEarnedGems}`, fCanvas.width/2, fCanvas.height/2 + 70);
            fCtx.fillStyle = '#fff';
            fCtx.font = '900 35px Inter';
            fCtx.fillText("Tap to Restart", fCanvas.width/2, fCanvas.height/2 + 130);
        }

        fAnimationId = requestAnimationFrame(flappyLoop);
    }

    function checkCollision(r1, r2) {
        return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x &&
               r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
    }

    // (Initial render, rebirth call as before)
    // --- INIT ---
    initCanvasParticles();
    initCanvasParticlesDraw(); // As before, distinct from Flappy canvas
    renderMainUI();
</script>
</body>
</html>
