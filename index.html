<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siamese Agency Clicker</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --secondary: rgba(243, 244, 246, 0.9);
            --border: #e5e7eb;
            --accent: #007AFF;
        }

        * { box-sizing: border-box; user-select: none; -webkit-user-drag: none; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- NATIVE LIQUID B&W BACKGROUND --- */
        #liquid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: radial-gradient(circle at 50% 50%, #f0f0f0 0%, #ffffff 100%);
        }

        #liquid-motion {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%; z-index: -1;
            background: repeating-radial-gradient(circle at 0% 0%, transparent 0, transparent 50px, rgba(0,0,0,0.02) 50px, rgba(0,0,0,0.02) 100px);
            animation: move 25s linear infinite;
            filter: blur(3px);
            opacity: 0.7;
        }

        @keyframes move { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #effect-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* --- Layout --- */
        #game-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        #sidebar {
            width: 420px;
            border-left: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            display: flex; flex-direction: column; padding: 20px;
        }

        #points { font-size: 5.5rem; font-weight: 900; margin: 0; letter-spacing: -4px; line-height: 1; }

        /* --- Nav --- */
        .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .nav-btn { background: #000; color: #fff; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; font-weight: 900; font-size: 1.2rem; }

        /* --- Clicker --- */
        #clicker-container { cursor: pointer; transition: transform 0.05s; margin: 30px 0; }
        #clicker-image { width: 340px; height: 340px; object-fit: contain; }
        #clicker-container:active { transform: scale(0.9); }

        /* --- Upgrades --- */
        .upgrade-card {
            background: var(--secondary);
            border-radius: 16px; padding: 16px; margin-bottom: 12px;
            cursor: pointer; display: flex; align-items: center; gap: 16px;
            border: 2px solid transparent; transition: 0.2s;
        }
        .upgrade-card:hover:not(.locked) { background: #fff; border-color: #000; transform: translateX(-5px); }
        .upgrade-card.locked { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }

        .upgrade-icon { width: 64px; height: 64px; border-radius: 12px; object-fit: cover; background: #eee; border: 1px solid #ddd; }
        .u-name { font-weight: 900; font-size: 1.1rem; display: block; }
        .u-desc { font-size: 0.75rem; color: #666; font-weight: 600; }
        .u-cost { font-weight: 800; font-size: 0.95rem; color: var(--accent); }

        .particle {
            position: absolute; font-weight: 900; pointer-events: none; color: #000;
            animation: pOut 0.6s ease-out forwards; font-size: 1.5rem;
        }
        @keyframes pOut {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -150px) scale(1.6); opacity: 0; }
        }

        .floating-item {
            position: absolute; width: 80px; height: 80px; opacity: 0.2;
            animation: floatLoop 30s linear infinite; pointer-events: none;
        }
        @keyframes floatLoop {
            0% { transform: translate(0,0) rotate(0deg); }
            50% { transform: translate(15vw, 15vh) rotate(180deg); }
            100% { transform: translate(0,0) rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="liquid-overlay"></div>
<div id="liquid-motion"></div>
<div id="effect-layer"></div>

<div id="game-view">
    <div style="text-align: center;">
        <div style="font-weight: 900; letter-spacing: 4px; font-size: 0.8rem; color: #999;">SIAMESE AGENCY</div>
        <h1 id="points">0</h1>
        <div id="stats-bar" style="font-weight: 700; color: #444; margin-top: 10px; font-size: 0.9rem;">
            <span id="power-display">+1/click</span> • <span id="pps-display">0/sec</span>
        </div>
    </div>

    <div id="clicker-container">
        <img id="clicker-image" src="IMG_2109-removebg-preview.png" alt="Clicker">
    </div>
</div>

<div id="sidebar">
    <div class="nav-header">
        <button class="nav-btn" onclick="changePage(-1)">←</button>
        <h2 id="page-title" style="font-weight: 900; font-size: 1.2rem; margin: 0;">AGENCY UPGRADES</h2>
        <button class="nav-btn" onclick="changePage(1)">→</button>
    </div>

    <div id="upgrades-list" style="flex: 1; overflow-y: auto;"></div>
    
    <div style="margin-top: 20px;">
        <button id="rebirth-btn" onclick="rebirth()" style="width:100%; padding:20px; background:#000; color:#fff; border:none; font-weight:900; border-radius:15px; cursor:pointer; font-size: 1.1rem;">REBIRTH</button>
    </div>
</div>

<script>
    let game = {
        points: 0n,
        clickPower: 1n,
        pointsPerSec: 0n,
        rebirths: 0n,
        agencyIdx: 0,
        jarvisIdx: 0,
        page: 0
    };

    const agencyUpgrades = [
        { name: "Rhythia Sync", img: "rhythia-steam.png" },
        { name: "Mugshot Protocol", img: "OIP.webp" },
        { name: "Diddy Synergy", img: "OIP (1).webp" },
        { name: "Vulnus Logic", img: "Annotation 2025-12-18 203140.png" },
        { name: "Baldi Education", img: "baldi.png-removebg-preview.png" },
        { name: "Blossom Speed", img: "blossom.gif" },
        { name: "Bradar Drive", img: "bradarwhatisthis.gif" },
        { name: "Noob Admin", img: "togif.gif" },
        { name: "Strategy Link", img: "togif-1.gif" },
        { name: "WhoIs Alter", img: "whoisalter.png" },
        { name: "King LeBron", img: "Screenshot 2026-01-11 211640.jpg" },
        { name: "Merch Stock", img: "IMG_3018.jpg" },
        { name: "Asset Group", img: "IMG_1114.jpg" },
        { name: "Agency Liquid", img: "image_a96080.jpg" },
        { name: "Final Optimal", img: "image.jpg" }
    ];

    function format(n) {
        if (n < 1000n) return n.toString();
        const units = ["", "k", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc"];
        let s = n.toString();
        let unitIdx = Math.floor((s.length - 1) / 3);
        let digits = s.length % 3 || 3;
        return s.substring(0, digits) + "." + s.substring(digits, digits + 2) + units[unitIdx];
    }

    function changePage(dir) {
        game.page = (game.page + dir + 2) % 2;
        document.getElementById('page-title').innerText = game.page === 0 ? "AGENCY UPGRADES" : "JARVIS BOTS";
        render();
    }

    function spawnFloating(src) {
        if (!src) return;
        const img = document.createElement('img');
        img.src = src;
        img.className = 'floating-item';
        img.style.left = Math.random() * 85 + "%";
        img.style.top = Math.random() * 85 + "%";
        document.getElementById('effect-layer').appendChild(img);
    }

    function render() {
        document.getElementById('points').innerText = format(game.points);
        const multi = 2n ** game.rebirths;
        document.getElementById('power-display').innerText = `+${format(game.clickPower * multi)}/click`;
        document.getElementById('pps-display').innerText = `${format(game.pointsPerSec * multi)}/sec`;
        
        const list = document.getElementById('upgrades-list');
        list.innerHTML = "";

        if (game.page === 0) {
            const up = agencyUpgrades[game.agencyIdx % agencyUpgrades.length];
            // Reverted scaling: First upgrade is 50, then 8x cost scaling
            const cost = 50n * (8n ** BigInt(game.agencyIdx));
            createCard(up.name, "Click Power", up.img, cost, () => {
                game.points -= cost;
                game.clickPower += (cost / 10n) + 2n;
                spawnFloating(up.img);
                game.agencyIdx++;
                render();
            });
        } else {
            // Jarvis Bots Reverted: First cost 500, then 10x scaling
            const cost = 500n * (10n ** BigInt(game.jarvisIdx));
            createCard(`Jarvis Unit ${game.jarvisIdx + 1}`, "Auto-Points", "", cost, () => {
                game.points -= cost;
                game.pointsPerSec += (cost / 8n) + 10n;
                game.jarvisIdx++;
                render();
            });
        }
        
        const rCost = 1000000n * (100n ** game.rebirths); // Reverted Rebirth
        document.getElementById('rebirth-btn').innerText = `REBIRTH (${format(rCost)})`;
        document.getElementById('rebirth-btn').disabled = game.points < rCost;
    }

    function createCard(name, desc, img, cost, onClick) {
        const card = document.createElement('div');
        card.className = `upgrade-card ${game.points < cost ? 'locked' : ''}`;
        card.innerHTML = `
            <img src="${img}" class="upgrade-icon">
            <div style="flex:1">
                <span class="u-name">${name}</span>
                <span class="u-desc">${desc}</span>
            </div>
            <div class="u-cost">${format(cost)}</div>
        `;
        if (game.points >= cost) card.onclick = onClick;
        document.getElementById('upgrades-list').appendChild(card);
    }

    document.getElementById('clicker-container').onmousedown = (e) => {
        const val = game.clickPower * (2n ** game.rebirths);
        game.points += val;
        const p = document.createElement('div');
        p.className = 'particle';
        p.innerText = `+${format(val)}`;
        p.style.left = e.clientX + "px"; p.style.top = e.clientY + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 600);
        render();
    };

    // Passive Income Logic
    setInterval(() => {
        const income = game.pointsPerSec * (2n ** game.rebirths);
        game.points += income;
        document.getElementById('points').innerText = format(game.points);
    }, 1000);

    function rebirth() {
        const cost = 1000000n * (100n ** game.rebirths);
        if (game.points >= cost) {
            game.points = 0n; game.clickPower = 1n; game.pointsPerSec = 0n;
            game.agencyIdx = 0; game.jarvisIdx = 0;
            game.rebirths++;
            document.getElementById('effect-layer').innerHTML = "";
            render();
        }
    }

    render();
</script>

</body>
</html>
