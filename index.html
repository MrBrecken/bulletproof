<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siamese Clicker</title>

    <meta property="og:title" content="Siamese Clicker">
    <meta property="og:description" content="CLICK THE IDIOT">
    <meta property="og:image" content="IMG_2109.jpg">

    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-gray: #E9E9EB;
            --ios-text-black: #000000;
            --ios-bg: #FFFFFF;
            --ios-secondary: #8E8E93;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text-black);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header / Contact Info */
        header {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #DBDBDB;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .contact-avatar {
            width: 45px;
            height: 45px;
            background: #CCC;
            border-radius: 50%;
            margin: 0 auto 5px;
            overflow: hidden;
        }

        .contact-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .contact-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        /* Message Thread Area */
        #chat-thread {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stat-bubble {
            align-self: center;
            font-size: 12px;
            color: var(--ios-secondary);
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* The "Clicker" Image Bubble */
        .image-msg {
            align-self: flex-start;
            max-width: 75%;
        }

        #clicker-image {
            width: 100%;
            border-radius: 18px;
            cursor: pointer;
            transition: transform 0.05s ease-out;
            display: block;
        }

        #clicker-image:active {
            transform: scale(0.96);
        }

        /* Upgrade Bubbles (Look like incoming messages) */
        .upgrade-bubble {
            align-self: flex-start;
            background-color: var(--ios-gray);
            color: black;
            padding: 12px 16px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            max-width: 80%;
            font-size: 15px;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .upgrade-bubble:active {
            opacity: 0.7;
        }

        .upgrade-bubble.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .upgrade-bubble small {
            display: block;
            margin-top: 4px;
            font-size: 12px;
            color: var(--ios-secondary);
        }

        /* Rebirth (The "Action" Button) */
        .action-area {
            padding: 20px;
            border-top: 1px solid #DBDBDB;
            background: #F2F2F7;
        }

        #rebirth-btn {
            background-color: var(--ios-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
        }

        #rebirth-btn:disabled {
            background-color: #D1D1D6;
        }

        /* Floating +1 Text */
        .tap-feedback {
            position: absolute;
            color: var(--ios-blue);
            font-weight: bold;
            pointer-events: none;
            animation: iosFloat 0.6s ease-out forwards;
        }

        @keyframes iosFloat {
            0% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, -60px); opacity: 0; }
        }
    </style>
</head>
<body>

<header>
    <div class="contact-avatar">
        <img src="IMG_2109-removebg-preview.png" alt="Avatar">
    </div>
    <div class="contact-name">Siamese Agency</div>
    <div style="font-size: 11px; color: var(--ios-blue);">Active Now</div>
</header>

<div id="chat-thread">
    <div class="stat-bubble" id="points-display">POINTS: 0</div>
    
    <div class="image-msg">
        <img id="clicker-image" src="IMG_2109-removebg-preview.png" alt="Media File">
    </div>

    <div class="stat-bubble" id="rebirth-display">0 REBIRTHS</div>

    <div id="upgrades-container" style="display:flex; flex-direction:column; gap:10px;">
        </div>
</div>

<div class="action-area">
    <button id="rebirth-btn">Rebirth (Cost: 1M)</button>
    <p style="text-align:center; font-size: 11px; color: var(--ios-secondary); margin-top: 10px;">
        Tap the image to generate points.
    </p>
</div>

<script>
    let game = {
        points: 0n,
        rebirths: 0n,
        clickPower: 1n,
        upgradeLevel: 0
    };

    const prefixes = ["Optimization", "Neural", "Agency", "Liquid", "Siamese", "Cloud", "Quantum"];
    const suffixes = ["Patch", "Protocol", "Sync", "Update", "Link"];

    function format(n) {
        if (n < 1000n) return n.toString();
        const units = ["", "K", "M", "B", "T", "Qa", "Qi"];
        let s = n.toString();
        let unitIdx = Math.floor((s.length - 1) / 3);
        if (unitIdx >= units.length) return s[0] + "." + s.substring(1,3) + "e" + (s.length - 1);
        let digits = s.length % 3 || 3;
        return s.substring(0, digits) + "." + s.substring(digits, digits + 2) + units[unitIdx];
    }

    function render() {
        document.getElementById('points-display').innerText = `POINTS: ${format(game.points)}`;
        document.getElementById('rebirth-display').innerText = `${game.rebirths} REBIRTHS`;
        
        const rCost = 1000000n * (50n ** game.rebirths);
        const rBtn = document.getElementById('rebirth-btn');
        rBtn.innerText = `Rebirth (Cost: ${format(rCost)})`;
        rBtn.disabled = game.points < rCost;

        updateUpgradeUI();
    }

    function updateUpgradeUI() {
        const container = document.getElementById('upgrades-container');
        container.innerHTML = "";
        
        const cost = 10n ** (BigInt(game.upgradeLevel) + 1n) * 3n;
        const bubble = document.createElement('div');
        bubble.className = `upgrade-bubble ${game.points < cost ? 'locked' : ''}`;
        
        const name = prefixes[game.upgradeLevel % prefixes.length] + " " + suffixes[game.upgradeLevel % suffixes.length];
        
        bubble.innerHTML = `
            <b>${name}</b>
            <small>Tap to buy • Cost: ${format(cost)}</small>
        `;

        bubble.onclick = () => {
            if (game.points >= cost) {
                game.points -= cost;
                game.clickPower += (cost / 4n);
                game.upgradeLevel++;
                saveGame();
                render();
            }
        };
        container.appendChild(bubble);
    }

    document.getElementById('clicker-image').onclick = (e) => {
        const val = game.clickPower * (2n ** game.rebirths);
        game.points += val;

        const fb = document.createElement('div');
        fb.className = 'tap-feedback';
        fb.innerText = `+${format(val)}`;
        fb.style.left = `${e.pageX}px`;
        fb.style.top = `${e.pageY}px`;
        document.body.appendChild(fb);
        setTimeout(() => fb.remove(), 600);

        render();
    };

    document.getElementById('rebirth-btn').onclick = () => {
        const cost = 1000000n * (50n ** game.rebirths);
        if (game.points >= cost) {
            game.points = 0n;
            game.clickPower = 1n;
            game.upgradeLevel = 0;
            game.rebirths++;
            saveGame();
            render();
        }
    };

    function saveGame() {
        const d = { 
            p: game.points.toString(), 
            r: game.rebirths.toString(), 
            cp: game.clickPower.toString(), 
            lv: game.upgradeLevel 
        };
        localStorage.setItem('siamese_ios_save', JSON.stringify(d));
    }

    function loadGame() {
        const s = localStorage.getItem('siamese_ios_save');
        if (s) {
            const d = JSON.parse(s);
            game.points = BigInt(d.p);
            game.rebirths = BigInt(d.r);
            game.clickPower = BigInt(d.cp);
            game.upgradeLevel = d.lv;
        }
        render();
    }

    window.onload = loadGame;
    setInterval(saveGame, 10000);
</script>

</body>
</html>
